<!DOCTYPE html>
<html>
<head>
<title>Mocker UI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1 class="mb-4">Mocker UI Dashboard</h1>

 <h2>Mock Endpoints</h2>
<table class="table table-striped">
<thead>
<tr><th>Method</th><th>Path</th><th>Response Body</th></tr>
</thead>
<tbody>
    {% for ep in endpoints %}
<tr>
<td>{{ ep.method }}</td>
<td>{{ ep.path }} </td>
<td>{{ ep.response.body }}</td>
</tr>
</tbody>
</table>

 <h2>Add New Mock</h2>
<form action="/add" method="post" class="mt-3">
<div class="mb-3">
<label class="form-label">Method</label>
<select name="method" class="form-select">
<option>GET</option>
<option>POST</option>
<option>PUT</option>
<option>DELETE</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Path</label>
<input type="text" name="path" class="form-control" value="/new">
</div>
<div class="mb-3">
<label class="form-label">Body</label>
<textarea name="body" class="form-control">{"message":"Hello UI"}</textarea>
</div>
<button type="submit" class="btn btn-primary">Add Mock</button>
</form>
</body>
</html>
